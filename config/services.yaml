# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

parameters:
    upload_dir: '%kernel.project_dir%/public/uploads/images'

    app.eav_value_entity_map:
        !php/const App\Entity\ProductAttributeValueText::TYPE: 'App\Entity\ProductAttributeValueText'
        !php/const App\Entity\ProductAttributeValueInt::TYPE: 'App\Entity\ProductAttributeValueInt'
        !php/const App\Entity\ProductAttributeValueImage::TYPE: 'App\Entity\ProductAttributeValueImage'
        !php/const App\Entity\ProductAttributeValueDecimal::TYPE: 'App\Entity\ProductAttributeValueDecimal'

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'

    App\Form\Attribute\Handler\:
        resource: '../src/Form/Attribute/Handler/'
        tags: ['app.attribute_form_handler']

    App\Form\Attribute\Handler\ImageAttributeFormHandler:
        tags: ['app.attribute_form_handler']
        arguments:
            $uploadDir: '%upload_dir%'

    App\Form\Attribute\AttributeFormRegistry:
        arguments:
            $handlers: !tagged_iterator app.attribute_form_handler

    App\Service\Eav\AttributeTypeRegistry:
        arguments:
            $valueEntityMap: '%app.eav_value_entity_map%'

    App\ApiResource\OpenApi\OpenApiFactory:
        decorates: 'api_platform.openapi.factory'
        arguments:
            $decorated: '@App\ApiResource\OpenApi\OpenApiFactory.inner'

    App\Service\Product\Collection\ProductSelectApplier:
        tags:
            - { name: 'app.product.collection_applier', priority: 300 }

    App\Service\Eav\Filter\SmartEavFilterApplier:
        tags:
            - { name: 'app.product.collection_applier', priority: 200 }

    App\Service\Product\Collection\ProductSortApplier:
        tags:
            - { name: 'app.product.collection_applier', priority: 100 }

    App\State\ProductCollectionProvider:
        arguments:
            $collectionAppliers: !tagged_iterator
                tag: 'app.product.collection_applier'

    App\Subscriber\TimestampSubscriber:
        tags:
            - { name: doctrine.event_subscriber }

    App\Subscriber\ProductTimestampOnFlush:
        arguments:
            $valueEntityMap: '%app.eav_value_entity_map%'
        tags:
            - { name: doctrine.event_listener, event: onFlush }

    App\Subscriber\ApiExceptionSubscriber:
        tags:
            - { name: kernel.event_subscriber }

    App\Service\Eav\AttributeValueHandler\:
        resource: '../src/Service/Eav/AttributeValueHandler/'
        tags: [ 'app.attribute_value_handler' ]

    App\Service\Eav\AttributeValueHandlerRegistry:
        arguments:
            $handlers: !tagged_iterator app.attribute_value_handler
